# SECRET TEMPLATE — do not commit real values.
# Populate via CI/CD (e.g. kubectl create secret generic mammoth-secrets --from-env-file=.env.production)
# or use external-secrets-operator pointing at Vault / AWS Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: mammoth-secrets
  namespace: mammoth
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
  QDRANT_API_KEY: "REPLACE_ME"
  TOKEN_ENCRYPTION_KEY: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  # LinkedIn OAuth
  LINKEDIN_CLIENT_ID: "REPLACE_ME"
  LINKEDIN_CLIENT_SECRET: "REPLACE_ME"
  LINKEDIN_REDIRECT_URI: "REPLACE_ME"
  # Twitter / X OAuth
  TWITTER_CLIENT_ID: "REPLACE_ME"
  TWITTER_CLIENT_SECRET: "REPLACE_ME"
  TWITTER_REDIRECT_URI: "REPLACE_ME"
  # Integrations
  EXA_API_KEY: "REPLACE_ME"
  VAPI_API_KEY: "REPLACE_ME"
  N8N_WEBHOOK_URL: "REPLACE_ME"
  # Vault (optional — if using HashiCorp Vault instead of env-based secrets)
  VAULT_ADDR: "REPLACE_ME"
  VAULT_TOKEN: "REPLACE_ME"
