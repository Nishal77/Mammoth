apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mammoth
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/mammoth/api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mammoth-config
            - secretRef:
                name: mammoth-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: mammoth
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
