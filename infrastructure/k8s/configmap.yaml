apiVersion: v1
kind: ConfigMap
metadata:
  name: mammoth-config
  namespace: mammoth
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  QDRANT_URL: "http://qdrant-service:6333"
  TEMPORAL_ADDRESS: "temporal-service:7233"
  # Override per-service using individual Deployments' env blocks
