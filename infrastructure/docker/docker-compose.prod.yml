version: "3.9"

x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  QDRANT_URL: ${QDRANT_URL}

x-restart: &restart
  restart: unless-stopped

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mammoth_postgres
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mammoth_internal

  redis:
    image: redis:7-alpine
    container_name: mammoth_redis
    <<: *restart
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mammoth_internal

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: mammoth_qdrant
    <<: *restart
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mammoth_internal

  # ── Application services ──────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: mammoth_api
    <<: *restart
    environment:
      <<: *common-env
      PORT: "4000"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mammoth_internal
      - mammoth_external

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: mammoth_web
    <<: *restart
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mammoth_external

  agent-worker:
    build:
      context: ../..
      dockerfile: apps/agent-worker/Dockerfile
    container_name: mammoth_agent_worker
    <<: *restart
    environment:
      <<: *common-env
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MAX_AGENT_COST_PER_DAY_USD: ${MAX_AGENT_COST_PER_DAY_USD:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      # Scale workers horizontally as needed
      replicas: ${AGENT_WORKER_REPLICAS:-1}
    networks:
      - mammoth_internal

  orchestrator:
    build:
      context: ../..
      dockerfile: apps/orchestrator/Dockerfile
    container_name: mammoth_orchestrator
    <<: *restart
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mammoth_internal

  notification-service:
    build:
      context: ../..
      dockerfile: apps/notification-service/Dockerfile
    container_name: mammoth_notification_service
    <<: *restart
    environment:
      <<: *common-env
      NOTIFICATION_SERVICE_PORT: "3002"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBHOOK_DOMAIN: ${TELEGRAM_WEBHOOK_DOMAIN:-}
      META_WHATSAPP_ACCESS_TOKEN: ${META_WHATSAPP_ACCESS_TOKEN:-}
      META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID:-}
      META_WHATSAPP_VERIFY_TOKEN: ${META_WHATSAPP_VERIFY_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mammoth_internal
      - mammoth_external

networks:
  # Internal: services talk to each other, not exposed
  mammoth_internal:
    driver: bridge
    internal: true
  # External: services that need internet access (webhooks, bot callbacks)
  mammoth_external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
