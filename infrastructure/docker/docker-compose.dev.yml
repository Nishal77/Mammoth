version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mammoth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mammoth
      POSTGRES_PASSWORD: mammoth_dev
      POSTGRES_DB: mammoth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mammoth -d mammoth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mammoth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: mammoth_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mammoth_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional: Grafana + Prometheus + Loki for local observability
  prometheus:
    image: prom/prometheus:latest
    container_name: mammoth_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: mammoth_grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - observability

  envoy:
    build:
      context: ../envoy
      dockerfile: Dockerfile
    container_name: mammoth_envoy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
      - "9901:9901"
    depends_on:
      - postgres
      - redis
    profiles:
      - proxy

  # Temporal server — needed for durable multi-step workflows (sales cycle, etc.)
  # Start with: docker compose --profile workflows up temporal
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: mammoth_temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: mammoth
      POSTGRES_PWD: mammoth_dev
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    profiles:
      - workflows

  temporal-ui:
    image: temporalio/ui:2.28
    container_name: mammoth_temporal_ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    profiles:
      - workflows

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:
