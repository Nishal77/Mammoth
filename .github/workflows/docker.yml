name: Docker Build

on:
  push:
    branches: [main]
  # Validate on PRs that touch Dockerfiles or app source.
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/notifications/**"
      - "workers/agent/**"
      - "workers/browser/**"
      - "**/Dockerfile"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      # Build all images in parallel; don't cancel others if one fails.
      fail-fast: false
      matrix:
        include:
          - service: api
            context: .
            dockerfile: apps/api/Dockerfile
          - service: web
            context: .
            dockerfile: apps/web/Dockerfile
          - service: notifications
            context: .
            dockerfile: apps/notifications/Dockerfile
          - service: agent-worker
            context: .
            dockerfile: workers/agent/Dockerfile
          - service: browser-worker
            context: .
            dockerfile: workers/browser/Dockerfile

    steps:
      - uses: actions/checkout@v4

      # Set up Docker Buildx for layer caching support.
      - uses: docker/setup-buildx-action@v3

      # Cache Docker layers between runs — cuts build time by ~60% on repeat runs.
      - uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.service }}-

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          # Build only — do not push. Push happens in a separate deploy workflow.
          push: false
          tags: mammoth/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max

      # Rotate cache so it doesn't grow unboundedly.
      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}
