name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly so new CVEs in existing deps are caught without a code change.
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Dependency vulnerability audit ────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on critical vulnerabilities only.
      # High vulns in transitive deps (temporal→protobufjs, langchain→langsmith, prom-client→tmp)
      # cannot be patched until upstream packages release fixes — tracked separately.
      - name: Run pnpm audit
        run: pnpm audit --audit-level=critical

  # ── Secret scanning (GitHub native, no config needed) ─────────────────────
  #
  # GitHub's push protection and secret scanning run automatically on this repo.
  # This job adds an explicit gitleaks scan so PRs from forks are also checked.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits in the PR.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
